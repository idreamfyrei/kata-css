<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 340">
  <style>
    .bg   { fill: #f3ead6; }
    .letter { fill: #10100e; }
    .dot  { fill: #d94f3d; }
    @media (prefers-color-scheme: dark) {
      .bg     { fill: #10100e; }
      .letter { fill: #f3ead6; }
      .dot    { fill: #d94f3d; }
    }
  </style>

  <!-- background -->
  <rect width="320" height="340" class="bg"/>

  <!-- k -->
  <text
    x="28"
    y="272"
    font-family="'Satoshi', 'Helvetica Neue', Arial, sans-serif"
    font-size="280"
    font-weight="900"
    letter-spacing="-0.05em"
    class="letter"
  >k</text>

  <!-- red dot -->
  <circle cx="228" cy="258" r="38" class="dot"/>
</svg>